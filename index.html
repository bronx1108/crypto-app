<!DOCTYPE html>
<html>
<head>
  <title>Crypto App</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .logout {
      background: red;
    }
  </style>
</head>
<body>

<!-- LOGIN / REGISTER -->
<div id="authBox" class="box">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button><br><br>
  <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box" style="display:none;">
  <h2>Dashboard</h2>

  <p>Coin: <span id="coin">0</span></p>
  <p>USD: <span id="usd">0</span></p>

  <input id="amount" placeholder="Withdraw coin">
  <button onclick="withdraw()">Withdraw</button><br><br>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  'https://cywdtlptdmkvdehfduwm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5d2R0bHB0ZG1rdmRlaGZkdXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDE5MzEsImV4cCI6MjA5MDk3NzkzMX0.wew5KHC1NS62aWDtzxXBw3mSnA7XitpM2it5LPbcex8'
);

let currentUser = null;

// REGISTER
async function register() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signUp({
    email, password
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Register berhasil, silakan login");
}

// LOGIN
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;

  document.getElementById('authBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  loadDashboard();
}

// LOAD DATA
async function loadDashboard() {
  const { data: balance } = await supabase
    .from('balances')
    .select('coin')
    .eq('user_id', currentUser.id)
    .single();

  const { data: price } = await supabase.rpc('get_price');

  document.getElementById('coin').innerText = balance?.coin || 0;
  document.getElementById('usd').innerText =
    ((balance?.coin || 0) * price).toFixed(4);
}

// WITHDRAW
async function withdraw() {
  const amount = Number(document.getElementById('amount').value);

  const { data } = await supabase.rpc('do_withdraw', {
    p_user: currentUser.id,
    p_coin: amount
  });

  alert(data);
  loadDashboard();
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();

  document.getElementById('authBox').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}
</script>

</body>
</html>
