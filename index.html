<!DOCTYPE html>
<html>
<head>
  <title>Crypto App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 320px;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .login-btn {
      background: #22c55e;
      color: white;
    }

    .register-btn {
      background: #3b82f6;
      color: white;
    }

    .logout-btn {
      background: red;
      margin-top: 15px;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="authBox">
    <h2>Crypto App</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>💎 Crypto Dashboard</h2>

<div style="background:#0f172a;padding:10px;border-radius:10px;">
  <p>💰 Total Coin</p>
  <h1 id="coin">0</h1>
</div>

<br>

<div style="background:#0f172a;padding:10px;border-radius:10px;">
  <p>💵 Estimasi USD</p>
  <h2 id="usd">0</h2>
</div>

    <br>
<h3>Staking</h3>

<input id="stakeAmount" placeholder="Jumlah staking">
<button onclick="stake()">Stake</button>

<br><br>

<button onclick="claim()">Claim Reward</button>
    <input id="amount" placeholder="Withdraw coin">
    <button onclick="withdraw()">Withdraw</button>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  'https://cywdtlptdmkvdehfduwm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5d2R0bHB0ZG1rdmRlaGZkdXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDE5MzEsImV4cCI6MjA5MDk3NzkzMX0.wew5KHC1NS62aWDtzxXBw3mSnA7XitpM2it5LPbcex8'
);

let currentUser = null;

// REGISTER
async function register() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabaseClient.auth.signUp({
    email, password
  });

  if (error) return alert(error.message);

  alert("Register berhasil! Silakan login.");
}

// LOGIN
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if (error) return alert(error.message);

  currentUser = data.user;

  document.getElementById('authBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  loadDashboard();
}

// LOAD DATA
async function loadDashboard() {
  const { data: balance } = await supabaseClient
    .from('balances')
    .select('coin')
    .eq('user_id', currentUser.id)
    .single();

  const { data: price } = await supabaseClient.rpc('get_price');

  document.getElementById('coin').innerText = balance?.coin || 0;
  document.getElementById('usd').innerText =
    ((balance?.coin || 0) * price).toFixed(4);
}

// WITHDRAW
async function withdraw() {
  const amount = Number(document.getElementById('amount').value);

  const { data } = await supabaseClient.rpc('do_withdraw', {
    p_user: currentUser.id,
    p_coin: amount
  });

  alert(data);
  loadDashboard();
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();

  document.getElementById('authBox').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}

// STAKING
async function stake() {
  const amount = Number(document.getElementById('stakeAmount').value);

  const { data } = await supabaseClient.rpc('do_stake', {
    p_user: currentUser.id,
    p_coin: amount
  });

  alert(data);
  loadDashboard();
}

async function claim() {
  const { data } = await supabaseClient.rpc('claim_reward', {
    p_user: currentUser.id
  });

  alert("Reward: " + data);
  loadDashboard();
}
</script>

</body>
</html>
