<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  'https://cywdtlptdmkvdehfduwm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5d2R0bHB0ZG1rdmRlaGZkdXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDE5MzEsImV4cCI6MjA5MDk3NzkzMX0.wew5KHC1NS62aWDtzxXBw3mSnA7XitpM2it5LPbcex8'
);

async function loadWithdraw() {
  const { data } = await supabaseClient
    .from('withdrawals')
    .select('*')
    .eq('status','pending');

  let html = "";

  data.forEach(w => {
    html += `
      <div style="border:1px solid #ccc;margin:10px;padding:10px">
        User: ${w.user_id}<br>
        Coin: ${w.amount}<br>
        USDT: ${w.usdt}<br>
        Wallet: ${w.wallet}<br>

        <button onclick="approve('${w.id}')">Approve</button>
        <button onclick="reject('${w.id}')">Reject</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function approve(id) {
  await supabaseClient
    .from('withdrawals')
    .update({ status: 'paid' })
    .eq('id', id);

  alert("Approved");
  loadWithdraw();
}

async function reject(id) {
  await supabaseClient
    .from('withdrawals')
    .update({ status: 'reject' })
    .eq('id', id);

  alert("Rejected");
  loadWithdraw();
}

loadWithdraw();

const Web3 = require('web3');
const web3 = new Web3('https://bsc-dataseed.binance.org/');

const contract = new web3.eth.Contract(USDT_ABI, USDT_ADDRESS);

async function sendUSDT(to, amount) {
  return await contract.methods.transfer(to, amount).send({
    from: ADMIN_ADDRESS
  });
}

  
</script>
